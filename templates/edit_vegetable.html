{% extends "base.html" %}

{% block title %}编辑发布{% endblock %}

{% block head %} <script src="{{ url_for('static', filename='pub.js') }}"></script> {% endblock %}

{% endblock %}

{% block main %}
<div class="max-w-3xl mx-auto py-8">
    <h1 class="text-2xl font-bold mb-6">编辑发布</h1>

    <form method="post" class="space-y-5">
        <div>
            <label class="block mb-2 font-medium">图片</label>
            <input type="file" id="image-upload" accept="image/*" class="block w-full">
            <input type="hidden" id="picture" name="picture" value="{{ vegetable.picture }}">

            <div class="mt-3">
                <img
                    id="image-preview"
                    src="{{ vegetable.picture }}"
                    alt="{{ vegetable.name }}"
                    class="w-48 h-48 object-cover rounded border"
                >
                <div id="image-placeholder" class="hidden text-gray-500 mt-2">
                    暂无图片
                </div>
            </div>
        </div>

        <div>
            <label class="block mb-2 font-medium">名称</label>
            <input
                type="text"
                id="name"
                name="name"
                value="{{ vegetable.name }}"
                class="w-full border rounded px-3 py-2"
            >
        </div>

        <div>
            <label class="block mb-2 font-medium">分类</label>
            <select id="category" name="category" class="w-full border rounded px-3 py-2">
                <option value="">请选择分类</option>
                {% for c in categories %}
                    <option value="{{ c.id }}" {% if vegetable.category_id == c.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block mb-2 font-medium">价格</label>
            <input
                type="text"
                id="price"
                name="price"
                value="{{ vegetable.price }}"
                class="w-full border rounded px-3 py-2"
            >
        </div>

        <div>
            <label class="block mb-2 font-medium">描述</label>
            <textarea
                name="content"
                rows="4"
                class="w-full border rounded px-3 py-2"
            >{{ vegetable.content or '' }}</textarea>
        </div>

        <div>
            <label class="block mb-2 font-medium">供应商</label>
            <input
                type="text"
                name="provider"
                value="{{ vegetable.provider or '' }}"
                class="w-full border rounded px-3 py-2"
            >
        </div>

        <div>
            <label class="block mb-2 font-medium">联系电话</label>
            <input
                type="text"
                name="mobile"
                value="{{ vegetable.mobile or '' }}"
                class="w-full border rounded px-3 py-2"
            >
        </div>

        <div>
            <label class="block mb-2 font-medium">产地</label>
            <input
                type="text"
                name="place"
                value="{{ vegetable.place or '' }}"
                class="w-full border rounded px-3 py-2"
            >
        </div>

        <div class="flex gap-3">
            <button type="submit" class="px-5 py-2 rounded bg-green-600 text-white">
                保存修改
            </button>
            <a href="{{ url_for('vegetable.my_vegetables') }}" class="px-5 py-2 rounded border">
                取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
